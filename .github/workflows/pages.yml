name: Deploy GitHub Pages

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: chop/package-lock.json

      - name: Install Chop dependencies
        working-directory: chop
        run: npm ci

      - name: Build Chop
        working-directory: chop
        run: npm run build

      - name: Assemble Pages artifact
        run: |
          mkdir _site
          rsync -a ./ _site/ \
            --exclude .git/ \
            --exclude .github/ \
            --exclude _site/ \
            --exclude node_modules/ \
            --exclude chop/
          mkdir -p _site/chop
          cp -a chop/dist/. _site/chop/
          touch _site/.nojekyll

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
